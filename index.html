<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>WebSSH Terminal Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <style>
        body { background-color: #0c0c0c; margin: 0; padding: 20px; color: #fff; font-family: monospace; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input { padding: 8px; background: #222; color: #0f0; border: 1px solid #444; border-radius: 4px; outline: none; }
        input::placeholder { color: #666; }
        button { padding: 8px 20px; background: #007acc; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005f9e; }
        #terminal { width: 100%; height: 75vh; border: 1px solid #333; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>🚀 Serverless WebSSH (Route A)</h2>
    <div class="toolbar">
        <input type="text" id="hostInput" placeholder="VPS IP" value="" />
        <input type="text" id="portInput" placeholder="Port" value="22" style="width: 60px;" />
        <input type="text" id="userInput" placeholder="root" value="root" style="width: 80px;" />
        <input type="password" id="passInput" placeholder="密码" value="" />
        <button onclick="connectSSH()">连接服务器</button>
    </div>
    <div id="terminal"></div>

    <script>
        const term = new Terminal({ 
            cursorBlink: true, 
            theme: { background: '#0c0c0c', foreground: '#cccccc' },
            fontFamily: 'Consolas, "Courier New", monospace'
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();
        
        term.writeln('\x1b[36m欢迎使用自建 WebSSH 工具\x1b[0m');
        term.writeln('请在上方输入服务器凭证并点击连接...');

        let ws = null;

        // 监听用户的键盘输入，并通过 WebSocket 发送出去
        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        function connectSSH() {
            const host = document.getElementById('hostInput').value;
            const port = document.getElementById('portInput').value;
            const username = document.getElementById('userInput').value;
            const password = document.getElementById('passInput').value;
            
            if(!host || !password) {
                alert("请输入 IP 和 密码！"); return;
            }

            term.reset();
            term.writeln(`\x1b[33m[System]\x1b[0m 正在通过 Cloudflare Edge 节点连接 ${host}...`);

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ssh`);

            ws.onopen = () => {
                term.writeln('\x1b[33m[System]\x1b[0m WebSocket 已连接，正在验证 SSH 凭证...');
                // 首次连接时，把账号密码打包成 JSON 发给后端用于解密
                const creds = { host, port, username, password };
                ws.send(JSON.stringify(creds));
            };

            ws.onmessage = async (event) => {
                let data = event.data instanceof Blob ? await event.data.text() : event.data;
                // 将后端传来的纯文本打印到终端
                term.write(data);
            };

            ws.onclose = () => term.writeln('\r\n\x1b[31m[System]\x1b[0m 连接已安全断开。');
            ws.onerror = () => term.writeln(`\r\n\x1b[31m[System]\x1b[0m WebSocket 通信异常`);
        }

        // 监听窗口大小改变，自适应终端
        window.addEventListener('resize', () => fitAddon.fit());
    </script>
</body>
</html>
